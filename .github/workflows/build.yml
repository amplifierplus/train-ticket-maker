name: Build Mac App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Build Vue
        run: npm run build

      - name: Build Electron for Mac
        run: npx electron-builder --mac

      - name: Upload Build
        uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: build/
