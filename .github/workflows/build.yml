name: Build Mac Only

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: 进入正确目录（关键修复）
      run: cd train-ticket-maker

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install dependencies
      run: cd train-ticket-maker && npm install

    - name: Build Vue
      run: cd train-ticket-maker && npm run build

    - name: Build Electron for Mac
      run: cd train-ticket-maker && npx electron-builder --mac

    - name: Upload Mac Build
      uses: actions/upload-artifact@v4
      with:
        name: build-mac
        path: train-ticket-maker/build/
